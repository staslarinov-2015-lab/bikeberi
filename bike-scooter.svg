<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 36" fill="none">
  <!-- Wenbox U2: мини-силуэт в профиль (ступенька, маска, круглая LED-фара, акцент на раме) -->
  <defs>
    <linearGradient id="u2-body" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6f7a62"/>
      <stop offset="1" stop-color="#4d5544"/>
    </linearGradient>
  </defs>
  <!-- Заднее колесо -->
  <circle cx="13" cy="25.5" r="7.2" fill="#121418"/>
  <circle cx="13" cy="25.5" r="7.2" stroke="#2a3038" stroke-width="0.6"/>
  <circle cx="13" cy="25.5" r="2.6" fill="#3a424c"/>
  <!-- Переднее колесо -->
  <circle cx="51" cy="25.5" r="7.2" fill="#121418"/>
  <circle cx="51" cy="25.5" r="7.2" stroke="#2a3038" stroke-width="0.6"/>
  <circle cx="51" cy="25.5" r="2.6" fill="#3a424c"/>
  <!-- Нижняя линия подножки / крепление -->
  <path
    d="M18 22.5h30"
    stroke="url(#u2-body)"
    stroke-width="3.2"
    stroke-linecap="round"
  />
  <!-- Оранжевый элемент рамы (характерный акцент U2) -->
  <path d="M33 23V9" stroke="#e86a12" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M33 9.5h1.8" stroke="#ff9a4a" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <!-- Аккумуляторный короб / под сиденьем -->
  <rect x="17" y="11" width="14" height="7" rx="1.4" fill="url(#u2-body)" stroke="#3d4538" stroke-width="0.45"/>
  <!-- Сиденье -->
  <path
    d="M15 13.5c2.2-3.2 6-4.8 10.5-4.8h5.5c2.8 0 4.5 1.2 5.2 3.2"
    stroke="#14181c"
    stroke-width="2.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Руль / стойка -->
  <path d="M40 12.5L44 7" stroke="#14181c" stroke-width="2" stroke-linecap="round"/>
  <path d="M44 7h6" stroke="#14181c" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Передняя маска (высокая панель) -->
  <path
    d="M38 7.5h14c1.1 0 2 0.9 2 2v11.5c0 1.1-0.9 2-2 2H40.5c-1.4 0-2.5-1.1-2.5-2.5V7.5z"
    fill="url(#u2-body)"
    stroke="#3d4538"
    stroke-width="0.45"
  />
  <!-- Круглая LED-фара с кольцом -->
  <circle cx="47" cy="13.5" r="4.6" fill="#eef2ff" stroke="#c5d0e5" stroke-width="0.55"/>
  <circle cx="47" cy="13.5" r="3.1" fill="#ffffff" opacity="0.95"/>
  <circle cx="45.6" cy="12.3" r="0.9" fill="#ffffff" opacity="0.55"/>
  <!-- Переход вилка–пол -->
  <path d="M40.5 21.5L38 22.5" stroke="#3d4538" stroke-width="1.6" stroke-linecap="round"/>
</svg>
