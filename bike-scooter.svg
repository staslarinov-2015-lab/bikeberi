<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="wenbox-body" x1="12" y1="8" x2="36" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7a856f"/>
      <stop offset="1" stop-color="#4f5642"/>
    </linearGradient>
    <radialGradient id="wenbox-halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(24 18) rotate(90) scale(10)">
      <stop stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#e8f0ff"/>
      <stop offset="1" stop-color="#c8d6ee"/>
    </radialGradient>
    <filter id="wenbox-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Tire -->
  <ellipse cx="24" cy="42.5" rx="12" ry="3.8" fill="#121212"/>
  <ellipse cx="24" cy="41.8" rx="8" ry="2.2" fill="#2a2a2a" opacity="0.45"/>
  <!-- Main shield (front panel) -->
  <path
    filter="url(#wenbox-soft)"
    d="M13 9.5h22c2.35 0 4.25 1.9 4.25 4.25v17.5c0 2.35-1.9 4.25-4.25 4.25H13c-2.35 0-4.25-1.9-4.25V13.75c0-2.35 1.9-4.25 4.25-4.25z"
    fill="url(#wenbox-body)"
    stroke="#3a4034"
    stroke-width="0.6"
  />
  <!-- Orange frame accent -->
  <rect x="31.2" y="10" width="3.6" height="22.5" rx="1.2" fill="#e85d12"/>
  <rect x="31.8" y="11" width="1.2" height="18" rx="0.4" fill="#ff9f5a" opacity="0.35"/>
  <!-- Lower leg / fork block -->
  <path d="M18 34.5h12v5.2a1.2 1.2 0 0 1-1.2 1.2H19.2a1.2 1.2 0 0 1-1.2-1.2v-5.2z" fill="#252525"/>
  <!-- Headlight halo ring -->
  <circle cx="24" cy="19" r="10" fill="url(#wenbox-halo)" opacity="0.95"/>
  <circle cx="24" cy="19" r="8.2" stroke="#b8c8de" stroke-width="0.75" fill="#fbfdff"/>
  <circle cx="24" cy="19" r="5.8" fill="#ffffff" opacity="0.96"/>
  <ellipse cx="21.5" cy="17" rx="1.8" ry="1.2" fill="#ffffff" opacity="0.55"/>
  <!-- Stem + display -->
  <rect x="21.5" y="7.2" width="5" height="4.2" rx="1" fill="#1e1e1e"/>
  <rect x="22.2" y="8" width="3.6" height="2.4" rx="0.35" fill="#3a4558"/>
  <!-- Handlebar -->
  <path d="M9.5 8.8h29" stroke="#141414" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="9.5" cy="8.8" r="1.35" fill="#141414"/>
  <circle cx="38.5" cy="8.8" r="1.35" fill="#141414"/>
</svg>
